{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">
        Ajouter une annonce d'agence
    </h2>

    <form method="post">

        {% csrf_token %}

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Type de bien</label>

                <select name="type" class="form-select" required>
                    <option value="">Choisir...</option>
                    <option value="TERRAIN">Terrain</option>
                    <option value="BATIMENT">Bâtiment</option>
                    <option value="APPARTEMENT">Appartement</option>
                    <option value="VILLA">Villa</option>
                    <option value="COMMERCE">Commerce</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Usage</label>

                <select name="usage" class="form-select" required>
                    <option value="">Choisir...</option>
                    <option value="RESIDENCE">Résidence</option>
                    <option value="BUREAU">Bureau</option>
                    <option value="COMMERCE">Commerce</option>
                    <option value="AGRICULTURE">Agriculture</option>
                </select>
            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Superficie (m²)</label>

                <input type="number" step="0.01" name="superficie" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Ville</label>

                <input type="text" name="ville" class="form-control" required>
            </div>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Localisation
            </label>

            <input type="text" name="localisation" class="form-control" required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Type d'annonce
            </label>

            <select name="option" class="form-select" required>
                <option value="">Choisir...</option>
                <option value="LOCATION">Location</option>
                <option value="VENTE">Vente</option>
            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Prix (FCFA)
            </label>

            <input type="number" step="0.01" name="prix" class="form-control" required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Description
            </label>

            <textarea name="description" rows="5" class="form-control" required></textarea>

        </div>

        <button type="submit" class="btn btn-success">
            Publier l'annonce
        </button>

        <a href="{% url 'mes_annonces_agence' %}" class="btn btn-secondary">
            Annuler
        </a>

    </form>

</div>

{% endblock %}
