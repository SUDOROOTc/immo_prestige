{% extends 'base.html' %}

{% block title %}Créer un utilisateur — ImmoFaso{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Créer un utilisateur</h2>
    <a href="{% url 'liste_utilisateurs' %}" class="btn btn-secondary">
        ← Retour à la liste
    </a>
</div>

{% if messages %}
{% for message in messages %}
<div class="alert alert-{{ message.tags }}">{{ message }}</div>
{% endfor %}
{% endif %}

<div class="card shadow-sm" style="max-width: 600px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <!-- RÔLE -->
            <div class="mb-3">
                <label class="form-label fw-bold">Rôle <span class="text-danger">*</span></label>
                <select name="role" class="form-select" required>
                    <option value="">-- Choisir un rôle --</option>
                    <option value="CLIENT">Client</option>
                    <option value="BAILLEUR">Bailleur</option>
                    <option value="AGENT">Agent</option>
                    <option value="MANAGER">Manager</option>
                </select>
            </div>

            <!-- NOM & PRÉNOM -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Prénom <span class="text-danger">*</span></label>
                    <input type="text" name="prenom" class="form-control" placeholder="Prénom" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Nom <span class="text-danger">*</span></label>
                    <input type="text" name="nom" class="form-control" placeholder="Nom" required>
                </div>
            </div>

            <!-- USERNAME -->
            <div class="mb-3">
                <label class="form-label fw-bold">Nom d'utilisateur <span class="text-danger">*</span></label>
                <input type="text" name="username" class="form-control" placeholder="username" required>
            </div>

            <!-- EMAIL -->
            <div class="mb-3">
                <label class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                <input type="email" name="email" class="form-control" placeholder="email@exemple.com" required>
            </div>

            <!-- TÉLÉPHONE -->
            <div class="mb-3">
                <label class="form-label fw-bold">Téléphone</label>
                <input type="text" name="telephone" class="form-control" placeholder="+226 XX XX XX XX">
            </div>

            <!-- MOT DE PASSE -->
            <div class="mb-4">
                <label class="form-label fw-bold">Mot de passe <span class="text-danger">*</span></label>
                <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                ✅ Créer le compte
            </button>
        </form>
    </div>
</div>

{% endblock %}
