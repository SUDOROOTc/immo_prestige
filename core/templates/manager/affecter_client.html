{% extends 'base.html' %}

{% block title %}Affecter un client — ImmoFaso{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Affecter un client à un agent</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Client</label>
                        <select name="client_id" class="form-select" required>
                            <option value="">-- Choisir un client --</option>
                            {% for client in clients %}
                                <option value="{{ client.id }}">
                                    {{ client.username }} — {{ client.first_name }} {{ client.last_name }}
                                    {% if client.agent_affecte %}
                                        (actuellement : {{ client.agent_affecte.username }})
                                    {% endif %}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Agent</label>
                        <select name="agent_id" class="form-select" required>
                            <option value="">-- Choisir un agent --</option>
                            {% for agent in agents %}
                                <option value="{{ agent.id }}">
                                    {{ agent.username }} — {{ agent.first_name }} {{ agent.last_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success w-100">
                            🔗 Affecter
                        </button>
                        <a href="{% url 'liste_utilisateurs' %}" class="btn btn-outline-secondary w-100">
                            Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
