{% extends 'base.html' %}
{% block content %}


<table class="table table-bordered">

    <thead>
        <tr>
            <th>Client</th>
            <th>Email</th>
            <th>Téléphone</th>
            <th>Agent affecté</th>
        </tr>
    </thead>

    <tbody>

        {% for client in clients %}

        <tr>

            <td>
                {{ client.first_name }}
                {{ client.last_name }}
            </td>

            <td>
                {{ client.email }}
            </td>

            <td>
                {{ client.telephone }}
            </td>

            <td>
                {{ client.agent_affecte.username }}
            </td>

        </tr>

        {% empty %}

        <tr>
            <td colspan="4">
                Aucun client affecté.
            </td>
        </tr>

        {% endfor %}

    </tbody>

</table>



{% endblock %}
